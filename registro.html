<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Tattoo Studio Admin</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
    <h1 class="logo-text">Tattoo<span>Admin</span></h1>
    <h2>Registro de Cita / Servicio</h2>

    <form id="registroForm">

        <h3>Datos del Cliente</h3>

        <div class="input-group">
            <div class="input-container">
                <label>Nombre</label>
                <input type="text" required>
            </div>

            <div class="input-container">
                <label>Teléfono</label>
                <input type="text" required>
            </div>
        </div>

        <h3>Detalles del Servicio</h3>

        <div class="input-group">
            <div class="input-container">
                <label>Tipo de Tatuaje</label>
                <select required>
                    <option disabled selected>Selecciona</option>
                    <option value="500">Pequeño - $500</option>
                    <option value="1500">Mediano - $1500</option>
                    <option value="3000">Grande - $3000</option>
                </select>
            </div>

            <div class="input-container">
                <label>Zona del Cuerpo</label>
                <input type="text" placeholder="Ej. brazo, espalda">
            </div>
        </div>

        <div class="input-group">
            <div class="input-container">
                <label>Fecha de Cita</label>
                <input type="date" required>
            </div>

            <div class="input-container">
                <label>Método de Pago</label>
                <select required>
                    <option disabled selected>Selecciona</option>
                    <option>Efectivo</option>
                    <option>Tarjeta</option>
                    <option>Transferencia</option>
                </select>
            </div>
        </div>

        <h3>Resumen</h3>

        <div class="resumen">
            <p>Precio: $<span id="precio">0</span></p>
        </div>

        <div class="buttons">
            <button type="submit" class="btn-main">Guardar Registro</button>
            <button type="reset" class="btn-secondary">Limpiar</button>
        </div>

    </form>
</div>

<script>
    const select = document.querySelector("select");
    const precio = document.getElementById("precio");

    select.addEventListener("change", function() {
        precio.textContent = this.value;
    });

    document.getElementById("registroForm").addEventListener("submit", function(e){
        e.preventDefault();
        alert("Registro guardado correctamente");
    });
</script>

</body>
</html>
