<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Tattoo Studio Admin</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
    <h1 class="logo-text">Tattoo<span>Admin</span></h1> 
    <h2>Registro de Cita / Servicio</h2>

    <form action="procesar.php" method="POST">
        
        <h3>Datos del Cliente</h3>
        <div class="input-group">
            <div class="input-container">
                <label>Nombre</label>
                <input type="text" name="nombre_cliente" required>
            </div>
            <div class="input-container">
                <label>Teléfono</label>
                <input type="text" name="telefono">
            </div>
        </div>

        <h3>Detalles del Servicio</h3>
        <div class="input-group">
            <div class="input-container">
                <label>Tipo de Tatuaje</label>
                <select name="tatuador" required>
                    <option value="" disabled selected>Selecciona</option>
                    <option value="Tatuaje Pequeño">Pequeño - $500</option>
                    <option value="Tatuaje Mediano">Mediano - $1500</option>
                    <option value="Tatuaje Grande">Grande - $3000</option>
                </select>
            </div>
            <div class="input-container">
                <label>Zona del Cuerpo</label>
                <input type="text" name="zona">
            </div>
        </div>

        <div class="input-group">
            <div class="input-container">
                <label>Fecha de Cita</label>
                <input type="date" name="fecha" required>
            </div>
            <div class="input-container">
                <label>Método de Pago</label>
                <select name="metodo_pago">
                    <option value="" disabled selected>Selecciona</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Transferencia">Transferencia</option>
                </select>
            </div>
        </div>

        <h3>Resumen</h3>
        <div class="resumen">
            <p>Precio: $<span id="precio">0</span></p>
        </div>

        <div class="buttons">
            <button type="submit" class="btn-main">Guardar Registro</button>
            <button type="reset" class="btn-secondary">Limpiar</button>
        </div>

    </form> 
</div>

<script>
    const select = document.querySelector("select[name='tatuador']");
    const precioDisplay = document.getElementById("precio");

    if (select) {
        select.addEventListener("change", function() {
            if(this.value === "Tatuaje Pequeño") precioDisplay.textContent = "500";
            if(this.value === "Tatuaje Mediano") precioDisplay.textContent = "1500";
            if(this.value === "Tatuaje Grande") precioDisplay.textContent = "3000";
        });
    }
</script>

</body>
</html>
