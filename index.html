<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Staff | Tattoo Studio</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="login-box">
        <h1 class="logo-text">Tattoo<span>Admin</span></h1>
        
        <h2>Acceso al Sistema</h2>

        <form action="menu.html">
            <div class="input-container">
                <label>Usuario o Correo</label>
                <input type="text" placeholder="Usuario de staff" required>
            </div>

            <div class="input-container">
                <label>Contraseña</label>
                <input type="password" placeholder="Escribe tu contraseña" required>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">Recordar sesión</label>
            </div>

            <button type="submit" class="btn-main">Iniciar Sesión</button>
        </form>

        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        
        <hr>

        <p class="signup">Solo personal autorizado. <br>Si tienes problemas, contacta al dueño.</p>
    </div>
</body>
</html>
