<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Staff | Tattoo Studio Admin</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="login-box">
        <h1 class="logo-text">Tattoo<span>Admin</span></h1>
        
        <h2>Acceso al Sistema</h2>

        <form action="menu.html">
            <div class="input-container">
                <label for="usuario">Usuario o Correo</label>
                <input type="text" id="usuario" placeholder="Usuario de staff" required>
            </div>

            <div class="input-container">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Escribe tu contraseña" required>
            </div>

            <div class="input-container">
                <label for="user-role">Empleado/Administrador</label>
                <select id="user-role" class="custom-select" required>
                    <option value="" disabled selected>Selecciona tu rango</option>
                    <option value="empleado">Empleado</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">Recordar sesión</label>
            </div>

            <button type="submit" class="btn-main">Iniciar Sesión</button>
        </form>

        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
        
        <hr>

        <p class="signup">
            Solo personal autorizado. <br>
            Si tienes problemas de acceso, contacta al administrador.
        </p>
    </div>
</body>
</html>
